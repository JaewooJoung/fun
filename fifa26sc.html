<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>2026 FIFA World Cup 일정</title>
<style>
:root{--bg:#0f1419;--card:#1a2129;--card2:#212a35;--line:#2c3744;--txt:#e8eef4;--muted:#8a99a8;--accent:#3ea6ff;--accent2:#34c759;--gold:#f5c542;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);line-height:1.5;padding:16px;max-width:1100px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:4px;font-weight:800}
.sub{color:var(--muted);font-size:.9rem;margin-bottom:18px}
.controls{position:sticky;top:0;background:rgba(15,20,25,.96);backdrop-filter:blur(8px);padding:12px 0;z-index:10;border-bottom:1px solid var(--line);margin-bottom:14px}
.tzrow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}
.tzlabel{font-size:.85rem;color:var(--muted);margin-right:4px}
.btn{background:var(--card2);border:1px solid var(--line);color:var(--txt);padding:7px 13px;border-radius:20px;cursor:pointer;font-size:.85rem;transition:.15s;white-space:nowrap}
.btn:hover{border-color:var(--accent)}
.btn.active{background:var(--accent);border-color:var(--accent);color:#06121f;font-weight:700}
.search{flex:1;min-width:160px;background:var(--card2);border:1px solid var(--line);color:var(--txt);padding:8px 13px;border-radius:20px;font-size:.85rem}
.tzinfo{font-size:.8rem;color:var(--accent2);margin-top:2px}
.stage{margin:22px 0 8px;font-size:1.05rem;font-weight:700;color:var(--gold);border-left:3px solid var(--gold);padding-left:10px}
table{width:100%;border-collapse:collapse;font-size:.88rem}
thead th{text-align:left;color:var(--muted);font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;padding:6px 8px;border-bottom:1px solid var(--line)}
tbody td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:top}
tbody tr:hover{background:var(--card)}
.dt{white-space:nowrap;font-variant-numeric:tabular-nums}
.dt .d{font-weight:600}
.dt .t{color:var(--accent);font-weight:700}
.match{font-weight:600}
.city{color:var(--muted);font-size:.82rem}
.mno{color:var(--muted);font-size:.75rem;font-family:monospace}
.note{font-size:.8rem;color:var(--muted);margin-top:18px;padding:12px;background:var(--card);border-radius:8px;border:1px solid var(--line)}
@media(max-width:560px){.mno-col{display:none}h1{font-size:1.3rem}body{padding:10px}}
</style>
</head>

<script>
const STAGE_ORDER=['Group A','Group B','Group C','Group D','Group E','Group F','Group G','Group H','Group I','Group J','Group K','Group L','Round of 32','Round of 16','Quarterfinals','Semifinals / Final'];
let currentTZ='auto';
function realTZ(){return currentTZ==='auto'?Intl.DateTimeFormat().resolvedOptions().timeZone:currentTZ;}
function fmt(iso){
  const tz=realTZ();
  const d=new Date(iso);
  const day=new Intl.DateTimeFormat('ko-KR',{timeZone:tz,month:'numeric',day:'numeric',weekday:'short'}).format(d);
  const time=new Intl.DateTimeFormat('ko-KR',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:false}).format(d);
  return {day,time};
}
function render(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const app=document.getElementById('app');
  app.innerHTML='';
  const byStage={};
  MATCHES.forEach(m=>{
    if(q && !(m.label.toLowerCase().includes(q)||m.city.toLowerCase().includes(q)||(m.mno&&m.mno.toLowerCase().includes(q)))) return;
    (byStage[m.stage]=byStage[m.stage]||[]).push(m);
  });
  STAGE_ORDER.forEach(st=>{
    const list=byStage[st]; if(!list)return;
    list.sort((a,b)=>new Date(a.iso)-new Date(b.iso));
    const h=document.createElement('div');h.className='stage';h.textContent=st;app.appendChild(h);
    const t=document.createElement('table');
    const isKO=st.indexOf('Group')!==0;
    t.innerHTML='<thead><tr><th>날짜·시간</th><th>경기</th>'+(isKO?'<th class="mno-col">No.</th>':'')+'<th class="mno-col">도시</th></tr></thead>';
    const tb=document.createElement('tbody');
    list.forEach(m=>{
      const f=fmt(m.iso);
      const tr=document.createElement('tr');
      tr.innerHTML='<td class="dt"><span class="d">'+f.day+'</span> <span class="t">'+f.time+'</span></td>'+
        '<td><div class="match">'+m.label+'</div></td>'+
        (isKO?'<td class="mno mno-col">'+m.mno+'</td>':'')+
        '<td class="city mno-col">'+m.city+'</td>';
      tb.appendChild(tr);
    });
    t.appendChild(tb);app.appendChild(t);
  });
  document.getElementById('tzinfo').textContent='표시 시간대: '+realTZ();
}
document.querySelectorAll('.btn[data-tz]').forEach(b=>{
  b.onclick=()=>{currentTZ=b.dataset.tz;document.querySelectorAll('.btn[data-tz]').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();};
});
document.getElementById('search').oninput=render;
document.querySelector('.btn[data-tz="auto"]').classList.add('active');
render();
</script>
