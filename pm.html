<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Maker</title>
<style>
  :root {
    --bg: #f7f7f5;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --border: #e5e5e2;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --success: #059669;
    --danger: #dc2626;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f0e;
      --card: #1a1a19;
      --text: #f0f0ee;
      --muted: #9a9a96;
      --border: #2a2a28;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .container { max-width: 720px; margin: 0 auto; }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 20px;
  }
  .header-text { flex: 1; min-width: 0; }
  h1 { font-size: 1.5rem; margin: 0 0 4px; font-weight: 700; }
  .subtitle { color: var(--muted); font-size: 0.85rem; }
  .lang-switcher {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    flex-shrink: 0;
  }
  .lang-flag { font-size: 1.2rem; line-height: 1; }
  .lang-switcher select {
    border: none;
    background: transparent;
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    padding: 2px 4px;
    cursor: pointer;
    outline: none;
    width: auto;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .optional { text-transform: none; font-weight: 400; opacity: 0.7; }
  input[type="text"], textarea, select {
    width: 100%;
    padding: 10px 12px;
    font-size: 0.95rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }
  textarea { resize: vertical; min-height: 70px; }
  .row { display: flex; gap: 8px; align-items: stretch; }
  .row > input { flex: 1; }
  button {
    padding: 10px 14px;
    font-size: 0.9rem;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  button.primary:hover {
    background: var(--accent-hover);
    border-color: var(--accent-hover);
    color: white;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .output {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .output-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .output-header label { margin: 0; }
  #output-text {
    width: 100%;
    min-height: 180px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Noto Sans KR', sans-serif;
    font-size: 0.95rem;
    line-height: 1.7;
    resize: vertical;
  }
  .status {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 4px;
    min-height: 1.2em;
  }
  .status.error { color: var(--danger); }
  .status.success { color: var(--success); }
  .role-row { display: flex; gap: 8px; }
  .role-row select { flex: 1; }
  #role-custom { display: none; margin-top: 8px; }
  #role-custom.show { display: block; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-text">
      <h1 id="t-title">📝 Prompt Maker</h1>
      <div class="subtitle" id="t-subtitle"></div>
    </div>
    <div class="lang-switcher">
      <span class="lang-flag" id="lang-flag">🇸🇪</span>
      <select id="lang-select" aria-label="Language">
        <option value="sv">Svenska</option>
        <option value="ko">한국어</option>
        <option value="en">English</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="field">
      <label for="name" id="t-label-name"></label>
      <input type="text" id="name">
    </div>
    <div class="field">
      <label for="location" id="t-label-location"></label>
      <div class="row">
        <input type="text" id="location">
        <button type="button" id="gps-btn">📍 GPS</button>
      </div>
      <div class="status" id="gps-status"></div>
    </div>
    <div class="field">
      <label for="date" id="t-label-date"></label>
      <input type="text" id="date">
    </div>
    <div class="field">
      <label for="role" id="t-label-role"></label>
      <div class="role-row">
        <select id="role"></select>
      </div>
      <input type="text" id="role-custom">
    </div>
    <div class="field">
      <label for="context" id="t-label-context"></label>
      <textarea id="context"></textarea>
    </div>
    <div class="field">
      <label for="instruction" id="t-label-instruction"></label>
      <textarea id="instruction"></textarea>
    </div>
    <div class="field">
      <label for="format" id="t-label-format"></label>
      <input type="text" id="format">
    </div>
    <div class="field">
      <label for="example" id="t-label-example"></label>
      <textarea id="example"></textarea>
    </div>
  </div>

  <div class="output">
    <div class="output-header">
      <label id="t-label-output"></label>
    </div>
    <textarea id="output-text" readonly></textarea>
    <div class="actions">
      <button type="button" class="primary" id="copy-btn"></button>
      <button type="button" id="edit-btn"></button>
      <button type="button" id="clear-btn"></button>
    </div>
    <div class="status" id="copy-status"></div>
  </div>
</div>

<script>
(function() {
  'use strict';
  const $ = (id) => document.getElementById(id);

  // ============================================================
  // i18n - text / role options / date format / prompt template
  // ============================================================
  const I18N = {

      msg: {
        noGeo: 'Den här enheten stöder inte platsinformation.',

        gpsGot: (acc) => `✓ GPS-koordinater (±${acc} m), översätter till adress...`,

      },
      roleGroups: [
        { label: 'Arbete / Fordon · AI', options: [
          'Software Supplier Quality Engineer (SW SQE)',
          'ADAS / Autonom körning-ingenjör',
          'Bilmjukvaruarkitekt',
          'Funktionssäkerhetsexpert (ISO 26262)',
          'Cybersäkerhetsexpert (ISO/SAE 21434)',
          'ASPICE-bedömare',
          'Systemingenjör',
          'AI/ML-forskare',
          'Julia-utvecklare',
          'Linux-systemutvecklare',
        ]},
        { label: 'Allmänt', options: [
          'Teknisk skribent', 'Kodgranskare', 'Projektledare',
          'Dataanalytiker', 'Översättare (EN↔KO)',
          'Redaktör / Korrekturläsare', 'Karriärcoach',
          'Juridisk rådgivare (allmän)', 'Marknadsföringsexpert',
          'Lärare / Handledare',
        ]},
      ],
      formatDate: (d) => {
        const months = ['januari','februari','mars','april','maj','juni',
                        'juli','augusti','september','oktober','november','december'];
        const days = ['söndag','måndag','tisdag','onsdag','torsdag','fredag','lördag'];
        return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
      },
      buildPrompt: (v) => {
        const intro = [];
        if (v.name) intro.push(`mitt namn är **${v.name}**`);
        if (v.location) intro.push(`jag befinner mig på **${v.location}**`);
        if (v.date) intro.push(`idag är det **${v.date}**`);
        const main = [];
        if (v.role) main.push(`Som **"${v.role}"**`);
        if (v.context) main.push(`med hänsyn till **${v.context}**`);
        if (v.instruction) main.push(`vänligen utför **${v.instruction}**`);
        const tail = [];
        if (v.format) tail.push(`Visa resultatet som **${v.format}**`);
        if (v.example) tail.push(`Vid behov, se exemplet nedan:\n\n${v.example}`);
        const out = [];
        if (intro.length) out.push(intro.join(', ').replace(/^./, c => c.toUpperCase()) + '.');
        if (main.length) out.push(main.join(', ') + '.');
        if (tail.length) out.push(tail.join('. ') + (v.example ? '' : '.'));
        return out.join(' ');
      },
    },
    ko: {
      flag: '🇰🇷', htmlLang: 'ko', nominatim: 'ko,en',
      title: '📝 프롬프트 메이커',
      subtitle: '필드를 채우면 아래 프롬프트가 자동으로 만들어져요',
      label: {
        name: '이름', location: '현재 위치', date: '오늘 날짜',
        role: '역할', context: '맥락', instruction: '지시사항',
        format: '출력 형식', example: '예시', output: '생성된 프롬프트',
        optional: '(선택)', paste: '(붙여넣기 가능)',
      },
      ph: {
        name: '예: Jaewoo',
        location: 'GPS 버튼을 누르거나 직접 입력',
        date: '자동 입력됨',
        context: '관련된 배경 정보, 자료, 상황 설명 등을 붙여넣으세요',
        instruction: '무엇을 해주길 원하는지',
        format: '예: 마크다운 표, 불릿 리스트, JSON, 보고서 형식 등',
        example: '참고할 만한 예시가 있으면 붙여넣으세요',
        roleCustom: '역할을 직접 입력하세요',
        roleSelect: '— 선택하세요 —',
        roleCustomOpt: '✏️ 직접 입력...',
      },
      btn: { copy: '📋 복사', edit: '✏️ 편집 모드', lock: '🔒 편집 잠금', clear: '🗑️ 초기화' },
      msg: {
        noGeo: '이 기기는 위치 정보를 지원하지 않아요.',
        gpsLoading: '📡 GPS 위치 가져오는 중...',
        gpsGot: (acc) => `✓ GPS 좌표 확보 (정확도 ±${acc}m), 주소 변환 중...`,
        gpsDone: (acc) => `✓ 위치 확인됨 (±${acc}m)`,
        gpsCoordsOnly: (err) => `좌표만 입력됨 (주소 변환 실패: ${err})`,
        gpsErr: {
          1: '위치 접근 권한이 거부됐어요. 브라우저 설정에서 허용해주세요.',
          2: 'GPS 신호를 가져올 수 없어요.',
          3: '시간 초과. 다시 시도해주세요.',
        },
        copyOk: '✓ 클립보드에 복사되었습니다!',
        copyEmpty: '복사할 내용이 없어요.',
        clearConfirm: '모든 입력을 지울까요?',
      },
      roleGroups: [
        { label: '업무 / 자동차 · AI', options: [
          'Software Supplier Quality Engineer (SW SQE)',
          'ADAS / Autonomous Driving 엔지니어',
          '자동차 소프트웨어 아키텍트',
          'Functional Safety (ISO 26262) 전문가',
          'Cybersecurity (ISO/SAE 21434) 전문가',
          'ASPICE Assessor',
          'Systems Engineer',
          'AI/ML 연구자',
          'Julia 개발자',
          'Linux 시스템 개발자',
        ]},
        { label: '범용', options: [
          '기술 문서 작성자', '코드 리뷰어', '프로젝트 매니저',
          '데이터 분석가', '번역가 (영↔한)', '편집자 / 교정자',
          '커리어 코치', '법률 자문 (일반)', '마케팅 전문가',
          '선생님 / 튜터',
        ]},
      ],
      formatDate: (d) => {
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const days = ['일','월','화','수','목','금','토'];
        return `${yyyy}년 ${mm}월 ${dd}일 (${days[d.getDay()]})`;
      },
      buildPrompt: (v) => {
        const intro = [];
        if (v.name) intro.push(`내 이름은 **${v.name}**이고`);
        if (v.location) intro.push(`현재 위치는 **${v.location}**이며`);
        if (v.date) intro.push(`오늘은 **${v.date}**이야`);
        const main = [];
        if (v.role) main.push(`**"${v.role}"**로서`);
        if (v.context) main.push(`**${v.context}**를 고려해`);
        if (v.instruction) main.push(`**${v.instruction}**을 수행해줘`);
        const tail = [];
        if (v.format) tail.push(`결과물은 **${v.format}**으로 보여줘`);
        if (v.example) tail.push(`필요하다면 다음 예시를 참고해:\n\n${v.example}`);
        const out = [];
        if (intro.length) out.push(intro.join(', ') + '.');
        if (main.length) out.push(main.join(', ') + '.');
        if (tail.length) out.push(tail.join('. ') + (v.example ? '' : '.'));
        return out.join(' ');
      },
    },
    en: {
      flag: '🇬🇧', htmlLang: 'en', nominatim: 'en',
      title: '📝 Prompt Maker',
      subtitle: 'Fill in the fields and your prompt will be built automatically below',
      label: {
        name: 'Name', location: 'Current location', date: "Today's date",
        role: 'Role', context: 'Context', instruction: 'Instruction',
        format: 'Output format', example: 'Example', output: 'Generated prompt',
        optional: '(optional)', paste: '(paste allowed)',
      },
      ph: {
        name: 'e.g. Jaewoo',
        location: 'Press GPS or type manually',
        date: 'Auto-filled',
        context: 'Paste background info, material, or situation here',
        instruction: 'What would you like me to do?',
        format: 'e.g. markdown table, bullet list, JSON, report',
        example: 'Paste an example for reference if helpful',
        roleCustom: 'Type your own role',
        roleSelect: '— Select —',
        roleCustomOpt: '✏️ Custom...',
      },
      btn: { copy: '📋 Copy', edit: '✏️ Edit', lock: '🔒 Lock', clear: '🗑️ Clear' },
      msg: {
        noGeo: 'This device does not support geolocation.',
        gpsLoading: '📡 Getting GPS location...',
        gpsGot: (acc) => `✓ GPS coordinates (±${acc}m), resolving address...`,
        gpsDone: (acc) => `✓ Location confirmed (±${acc}m)`,
        gpsCoordsOnly: (err) => `Coordinates only (address lookup failed: ${err})`,
        gpsErr: {
          1: 'Location permission denied. Please allow it in your browser settings.',
          2: 'Cannot acquire GPS signal.',
          3: 'Request timed out. Please try again.',
        },
        copyOk: '✓ Copied to clipboard!',
        copyEmpty: 'Nothing to copy.',
        clearConfirm: 'Clear all inputs?',
      },
      roleGroups: [
        { label: 'Work / Automotive · AI', options: [
          'Software Supplier Quality Engineer (SW SQE)',
          'ADAS / Autonomous Driving Engineer',
          'Automotive Software Architect',
          'Functional Safety (ISO 26262) Expert',
          'Cybersecurity (ISO/SAE 21434) Expert',
          'ASPICE Assessor',
          'Systems Engineer',
          'AI/ML Researcher',
          'Julia Developer',
          'Linux Systems Developer',
        ]},
        { label: 'General', options: [
          'Technical Writer', 'Code Reviewer', 'Project Manager',
          'Data Analyst', 'Translator (EN↔KO)', 'Editor / Proofreader',
          'Career Coach', 'Legal Advisor (general)', 'Marketing Expert',
          'Teacher / Tutor',
        ]},
      ],
      formatDate: (d) => d.toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      }),
      buildPrompt: (v) => {
        const intro = [];
        if (v.name) intro.push(`my name is **${v.name}**`);
        if (v.location) intro.push(`I'm currently at **${v.location}**`);
        if (v.date) intro.push(`today is **${v.date}**`);
        const main = [];
        if (v.role) main.push(`As a **"${v.role}"**`);
        if (v.context) main.push(`considering **${v.context}**`);
        if (v.instruction) main.push(`please perform **${v.instruction}**`);
        const tail = [];
        if (v.format) tail.push(`Show the result as **${v.format}**`);
        if (v.example) tail.push(`If helpful, refer to the example below:\n\n${v.example}`);
        const out = [];
        if (intro.length) out.push(intro.join(', ').replace(/^./, c => c.toUpperCase()) + '.');
        if (main.length) out.push(main.join(', ') + '.');
        if (tail.length) out.push(tail.join('. ') + (v.example ? '' : '.'));
        return out.join(' ');
      },
    },
  };

  // ============================================================
  // 현재 언어 - localStorage 에 저장, 기본 sv
  // ============================================================
  let currentLang = 'sv';
  try {
    const saved = localStorage.getItem('promptMakerLang');
    if (saved && I18N[saved]) currentLang = saved;
  } catch (e) { /* ignore */ }

  const L = () => I18N[currentLang];

  // ============================================================
  // Role select 채우기 (언어 바뀔 때마다)
  // ============================================================
  function populateRoleSelect() {
    const lang = L();
    const select = $('role');
    const prevValue = select.value;
    select.innerHTML = '';

    const placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.textContent = lang.ph.roleSelect;
    select.appendChild(placeholder);

    lang.roleGroups.forEach(grp => {
      const og = document.createElement('optgroup');
      og.label = grp.label;
      grp.options.forEach(opt => {
        const o = document.createElement('option');
        o.value = opt;
        o.textContent = opt;
        og.appendChild(o);
      });
      select.appendChild(og);
    });

    const custom = document.createElement('option');
    custom.value = '__custom__';
    custom.textContent = lang.ph.roleCustomOpt;
    select.appendChild(custom);

    if (prevValue === '__custom__') {
      select.value = '__custom__';
    } else if (prevValue) {
      const found = Array.from(select.options).some(o => o.value === prevValue);
      select.value = found ? prevValue : '';
    }
  }

  // ============================================================
  // 모든 UI 텍스트 새로 그리기
  // ============================================================
  function applyLanguage() {
    const lang = L();
    document.documentElement.lang = lang.htmlLang;
    document.title = lang.title.replace(/^📝 /, '');
    $('lang-flag').textContent = lang.flag;
    $('t-title').textContent = lang.title;
    $('t-subtitle').textContent = lang.subtitle;

    $('t-label-name').textContent = lang.label.name;
    $('t-label-location').textContent = lang.label.location;
    $('t-label-date').textContent = lang.label.date;
    $('t-label-role').textContent = lang.label.role;
    $('t-label-context').innerHTML = `${lang.label.context} <span class="optional">${lang.label.paste}</span>`;
    $('t-label-instruction').textContent = lang.label.instruction;
    $('t-label-format').innerHTML = `${lang.label.format} <span class="optional">${lang.label.optional}</span>`;
    $('t-label-example').innerHTML = `${lang.label.example} <span class="optional">${lang.label.optional}</span>`;
    $('t-label-output').textContent = lang.label.output;

    $('name').placeholder = lang.ph.name;
    $('location').placeholder = lang.ph.location;
    $('date').placeholder = lang.ph.date;
    $('context').placeholder = lang.ph.context;
    $('instruction').placeholder = lang.ph.instruction;
    $('format').placeholder = lang.ph.format;
    $('example').placeholder = lang.ph.example;
    $('role-custom').placeholder = lang.ph.roleCustom;

    $('copy-btn').textContent = lang.btn.copy;
    $('clear-btn').textContent = lang.btn.clear;
    const out = $('output-text');
    $('edit-btn').textContent = out.readOnly ? lang.btn.edit : lang.btn.lock;

    setToday();
    populateRoleSelect();
    updateOutput();
  }

  function setToday() {
    $('date').value = L().formatDate(new Date());
  }

  // ============================================================
  // GPS + Nominatim
  // ============================================================
  $('gps-btn').addEventListener('click', () => {
    const status = $('gps-status');
    const lang = L();
    status.className = 'status';
    status.textContent = '';

    if (!navigator.geolocation) {
      status.className = 'status error';
      status.textContent = lang.msg.noGeo;
      return;
    }
    status.textContent = lang.msg.gpsLoading;
    $('gps-btn').disabled = true;

    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const { latitude, longitude, accuracy } = pos.coords;
        const acc = Math.round(accuracy);
        status.textContent = L().msg.gpsGot(acc);
        $('location').value = `${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
        updateOutput();

        try {
          const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&accept-language=${L().nominatim}&zoom=16`;
          const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const data = await res.json();
          const addr = data.display_name || `${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
          $('location').value = addr;
          status.className = 'status success';
          status.textContent = L().msg.gpsDone(acc);
          updateOutput();
        } catch (err) {
          status.className = 'status';
          status.textContent = L().msg.gpsCoordsOnly(err.message);
        } finally {
          $('gps-btn').disabled = false;
        }
      },
      (err) => {
        status.className = 'status error';
        status.textContent = L().msg.gpsErr[err.code] || `Error: ${err.message}`;
        $('gps-btn').disabled = false;
      },
      { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
    );
  });

  // ============================================================
  // Role custom 토글
  // ============================================================
  $('role').addEventListener('change', (e) => {
    const customInput = $('role-custom');
    if (e.target.value === '__custom__') {
      customInput.classList.add('show');
      customInput.focus();
    } else {
      customInput.classList.remove('show');
      customInput.value = '';
    }
    updateOutput();
  });

  // ============================================================
  // 프롬프트 생성
  // ============================================================
  function getRole() {
    const sel = $('role').value;
    if (sel === '__custom__') return $('role-custom').value.trim();
    return sel.trim();
  }

  function updateOutput() {
    if (!$('output-text').readOnly) return;
    const v = {
      name: $('name').value.trim(),
      location: $('location').value.trim(),
      date: $('date').value.trim(),
      role: getRole(),
      context: $('context').value.trim(),
      instruction: $('instruction').value.trim(),
      format: $('format').value.trim(),
      example: $('example').value.trim(),
    };
    $('output-text').value = L().buildPrompt(v);
  }

  ['name','location','date','role','context','instruction','format','example','role-custom']
    .forEach(id => $(id).addEventListener('input', updateOutput));

  // ============================================================
  // 복사 / 편집 / 초기화
  // ============================================================
  $('copy-btn').addEventListener('click', async () => {
    const text = $('output-text').value;
    if (!text) {
      $('copy-status').className = 'status error';
      $('copy-status').textContent = L().msg.copyEmpty;
      return;
    }
    try {
      await navigator.clipboard.writeText(text);
    } catch (err) {
      $('output-text').select();
      document.execCommand('copy');
    }
    $('copy-status').className = 'status success';
    $('copy-status').textContent = L().msg.copyOk;
    setTimeout(() => { $('copy-status').textContent = ''; }, 2500);
  });

  $('edit-btn').addEventListener('click', () => {
    const out = $('output-text');
    if (out.readOnly) {
      out.readOnly = false;
      $('edit-btn').textContent = L().btn.lock;
      out.focus();
    } else {
      out.readOnly = true;
      $('edit-btn').textContent = L().btn.edit;
      updateOutput();
    }
  });

  $('clear-btn').addEventListener('click', () => {
    if (!confirm(L().msg.clearConfirm)) return;
    ['name','location','context','instruction','format','example','role-custom']
      .forEach(id => { $(id).value = ''; });
    $('role').value = '';
    $('role-custom').classList.remove('show');
    $('gps-status').textContent = '';
    setToday();
    updateOutput();
  });

  // ============================================================
  // 언어 전환
  // ============================================================
  $('lang-select').addEventListener('change', (e) => {
    currentLang = e.target.value;
    try { localStorage.setItem('promptMakerLang', currentLang); } catch (e) {}
    applyLanguage();
  });

  // 초기화
  $('lang-select').value = currentLang;
  applyLanguage();
})();
</script>
</body>
</html>
