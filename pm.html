<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Maker</title>
<style>
  :root {
    --bg: #f7f7f5;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --border: #e5e5e2;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --success: #059669;
    --danger: #dc2626;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f0e;
      --card: #1a1a19;
      --text: #f0f0ee;
      --muted: #9a9a96;
      --border: #2a2a28;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .container { max-width: 720px; margin: 0 auto; }
  h1 {
    font-size: 1.5rem;
    margin: 0 0 4px;
    font-weight: 700;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .optional { text-transform: none; font-weight: 400; opacity: 0.7; }
  input[type="text"], textarea, select {
    width: 100%;
    padding: 10px 12px;
    font-size: 0.95rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }
  textarea { resize: vertical; min-height: 70px; }
  .row { display: flex; gap: 8px; align-items: stretch; }
  .row > input { flex: 1; }
  button {
    padding: 10px 14px;
    font-size: 0.9rem;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  button.primary:hover {
    background: var(--accent-hover);
    border-color: var(--accent-hover);
    color: white;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .output {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .output-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .output-header label { margin: 0; }
  #output-text {
    width: 100%;
    min-height: 180px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Noto Sans KR', sans-serif;
    font-size: 0.95rem;
    line-height: 1.7;
    resize: vertical;
  }
  .status {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 4px;
    min-height: 1.2em;
  }
  .status.error { color: var(--danger); }
  .status.success { color: var(--success); }
  .role-row { display: flex; gap: 8px; }
  .role-row select { flex: 1; }
  #role-custom { display: none; margin-top: 8px; }
  #role-custom.show { display: block; }
</style>
</head>
<body>
<div class="container">
  <h1>📝 Prompt Maker</h1>
  <div class="subtitle">필드를 채우면 아래 프롬프트가 자동으로 만들어져요</div>

  <div class="card">
    <div class="field">
      <label for="name">이름</label>
      <input type="text" id="name" placeholder="예: Jaewoo">
    </div>

    <div class="field">
      <label for="location">현재 위치</label>
      <div class="row">
        <input type="text" id="location" placeholder="GPS 버튼을 누르거나 직접 입력">
        <button type="button" id="gps-btn">📍 GPS</button>
      </div>
      <div class="status" id="gps-status"></div>
    </div>

    <div class="field">
      <label for="date">오늘 날짜</label>
      <input type="text" id="date" placeholder="자동 입력됨">
    </div>

    <div class="field">
      <label for="role">역할</label>
      <div class="role-row">
        <select id="role">
          <option value="">— 선택하세요 —</option>
          <optgroup label="업무 / 자동차 · AI">
            <option>Software Supplier Quality Engineer (SW SQE)</option>
            <option>ADAS / Autonomous Driving 엔지니어</option>
            <option>자동차 소프트웨어 아키텍트</option>
            <option>Functional Safety (ISO 26262) 전문가</option>
            <option>Cybersecurity (ISO/SAE 21434) 전문가</option>
            <option>ASPICE Assessor</option>
            <option>Systems Engineer</option>
            <option>AI/ML 연구자</option>
            <option>Julia 개발자</option>
            <option>Linux 시스템 개발자</option>
          </optgroup>
          <optgroup label="범용">
            <option>기술 문서 작성자</option>
            <option>코드 리뷰어</option>
            <option>프로젝트 매니저</option>
            <option>데이터 분석가</option>
            <option>번역가 (영↔한)</option>
            <option>편집자 / 교정자</option>
            <option>커리어 코치</option>
            <option>법률 자문 (일반)</option>
            <option>마케팅 전문가</option>
            <option>선생님 / 튜터</option>
          </optgroup>
          <option value="__custom__">✏️ 직접 입력...</option>
        </select>
      </div>
      <input type="text" id="role-custom" placeholder="역할을 직접 입력하세요">
    </div>

    <div class="field">
      <label for="context">맥락 <span class="optional">(붙여넣기 가능)</span></label>
      <textarea id="context" placeholder="관련된 배경 정보, 자료, 상황 설명 등을 붙여넣으세요"></textarea>
    </div>

    <div class="field">
      <label for="instruction">지시사항</label>
      <textarea id="instruction" placeholder="무엇을 해주길 원하는지"></textarea>
    </div>

    <div class="field">
      <label for="format">출력 형식 <span class="optional">(선택)</span></label>
      <input type="text" id="format" placeholder="예: 마크다운 표, 불릿 리스트, JSON, 보고서 형식 등">
    </div>

    <div class="field">
      <label for="example">예시 <span class="optional">(선택)</span></label>
      <textarea id="example" placeholder="참고할 만한 예시가 있으면 붙여넣으세요"></textarea>
    </div>
  </div>

  <div class="output">
    <div class="output-header">
      <label>생성된 프롬프트</label>
    </div>
    <textarea id="output-text" readonly></textarea>
    <div class="actions">
      <button type="button" class="primary" id="copy-btn">📋 복사</button>
      <button type="button" id="edit-btn">✏️ 편집 모드</button>
      <button type="button" id="clear-btn">🗑️ 초기화</button>
    </div>
    <div class="status" id="copy-status"></div>
  </div>
</div>

<script>
(function() {
  'use strict';

  const $ = (id) => document.getElementById(id);
  const fields = ['name', 'location', 'date', 'role', 'context', 'instruction', 'format', 'example'];

  // ---- 오늘 날짜 자동 입력 (한국식) ----
  function setToday() {
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    const days = ['일', '월', '화', '수', '목', '금', '토'];
    $('date').value = `${yyyy}년 ${mm}월 ${dd}일 (${days[d.getDay()]})`;
  }
  setToday();

  // ---- GPS 위치 가져오기 + Nominatim 주소 변환 ----
  $('gps-btn').addEventListener('click', () => {
    const status = $('gps-status');
    status.className = 'status';
    status.textContent = '';

    if (!navigator.geolocation) {
      status.className = 'status error';
      status.textContent = '이 기기는 위치 정보를 지원하지 않아요.';
      return;
    }

    status.textContent = '📡 GPS 위치 가져오는 중...';
    $('gps-btn').disabled = true;

    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const { latitude, longitude, accuracy } = pos.coords;
        status.textContent = `✓ GPS 좌표 확보 (정확도 ±${Math.round(accuracy)}m), 주소 변환 중...`;
        $('location').value = `${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
        updateOutput();

        try {
          const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&accept-language=ko,en&zoom=16`;
          const res = await fetch(url, {
            headers: { 'Accept': 'application/json' }
          });
          if (!res.ok) throw new Error('주소 변환 실패');
          const data = await res.json();
          const addr = data.display_name || `${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
          $('location').value = addr;
          status.className = 'status success';
          status.textContent = `✓ 위치 확인됨 (±${Math.round(accuracy)}m)`;
          updateOutput();
        } catch (err) {
          status.className = 'status';
          status.textContent = `좌표만 입력됨 (주소 변환 실패: ${err.message})`;
        } finally {
          $('gps-btn').disabled = false;
        }
      },
      (err) => {
        status.className = 'status error';
        const msgs = {
          1: '위치 접근 권한이 거부됐어요. 브라우저 설정에서 허용해주세요.',
          2: 'GPS 신호를 가져올 수 없어요.',
          3: '시간 초과. 다시 시도해주세요.'
        };
        status.textContent = msgs[err.code] || `오류: ${err.message}`;
        $('gps-btn').disabled = false;
      },
      {
        enableHighAccuracy: true,  // GPS 사용 (네트워크 위치 X)
        timeout: 20000,
        maximumAge: 0
      }
    );
  });

  // ---- 역할 드롭다운: Custom 입력 토글 ----
  $('role').addEventListener('change', (e) => {
    const customInput = $('role-custom');
    if (e.target.value === '__custom__') {
      customInput.classList.add('show');
      customInput.focus();
    } else {
      customInput.classList.remove('show');
      customInput.value = '';
    }
    updateOutput();
  });

  // ---- 프롬프트 생성 ----
  function getRole() {
    const sel = $('role').value;
    if (sel === '__custom__') return $('role-custom').value.trim();
    return sel.trim();
  }

  function buildPrompt() {
    const name = $('name').value.trim();
    const location = $('location').value.trim();
    const date = $('date').value.trim();
    const role = getRole();
    const context = $('context').value.trim();
    const instruction = $('instruction').value.trim();
    const format = $('format').value.trim();
    const example = $('example').value.trim();

    // 첫 문장 부분: 이름/위치/날짜
    const intro_parts = [];
    if (name) intro_parts.push(`내 이름은 **${name}**이고`);
    if (location) intro_parts.push(`현재 위치는 **${location}**이며`);
    if (date) intro_parts.push(`오늘은 **${date}**이며`);

    // 두 번째 부분: 역할/맥락/지시사항
    const main_parts = [];
    if (role) main_parts.push(`**"${role}"**로서`);
    if (context) main_parts.push(`**${context}**를 고려해`);
    if (instruction) main_parts.push(`**${instruction}**을 수행해줘`);

    // 세 번째 부분: 출력형식 / 예시 (둘 다 optional)
    const tail_parts = [];
    if (format) tail_parts.push(`결과물은 **${format}**으로 보여줘`);
    if (example) tail_parts.push(`필요하다면 다음 예시를 참고해:\n\n${example}`);

    // 조립
    const sentences = [];
    if (intro_parts.length) sentences.push(intro_parts.join(', ') + '.');
    if (main_parts.length) sentences.push(main_parts.join(', ') + '.');
    if (tail_parts.length) sentences.push(tail_parts.join('. ') + '.');

    return sentences.join(' ');
  }

  function updateOutput() {
    if (!$('output-text').readOnly) return;  // 편집 모드면 덮어쓰지 않음
    $('output-text').value = buildPrompt();
  }

  // 모든 필드 변경 시 자동 업데이트
  fields.forEach((id) => {
    const el = $(id);
    if (el) el.addEventListener('input', updateOutput);
  });
  $('role-custom').addEventListener('input', updateOutput);

  // ---- 복사 버튼 ----
  $('copy-btn').addEventListener('click', async () => {
    const text = $('output-text').value;
    if (!text) {
      $('copy-status').className = 'status error';
      $('copy-status').textContent = '복사할 내용이 없어요.';
      return;
    }
    try {
      await navigator.clipboard.writeText(text);
      $('copy-status').className = 'status success';
      $('copy-status').textContent = '✓ 클립보드에 복사되었습니다!';
      setTimeout(() => { $('copy-status').textContent = ''; }, 2500);
    } catch (err) {
      // Fallback for older browsers
      $('output-text').select();
      document.execCommand('copy');
      $('copy-status').className = 'status success';
      $('copy-status').textContent = '✓ 복사되었습니다!';
      setTimeout(() => { $('copy-status').textContent = ''; }, 2500);
    }
  });

  // ---- 편집 모드 토글 ----
  $('edit-btn').addEventListener('click', () => {
    const out = $('output-text');
    if (out.readOnly) {
      out.readOnly = false;
      $('edit-btn').textContent = '🔒 편집 잠금';
      out.focus();
    } else {
      out.readOnly = true;
      $('edit-btn').textContent = '✏️ 편집 모드';
      updateOutput();
    }
  });

  // ---- 초기화 ----
  $('clear-btn').addEventListener('click', () => {
    if (!confirm('모든 입력을 지울까요?')) return;
    ['name', 'location', 'context', 'instruction', 'format', 'example', 'role-custom'].forEach((id) => {
      $(id).value = '';
    });
    $('role').value = '';
    $('role-custom').classList.remove('show');
    $('gps-status').textContent = '';
    setToday();
    updateOutput();
  });

  // 초기 렌더
  updateOutput();
})();
</script>
</body>
</html>
